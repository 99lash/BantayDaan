<!-- src/templates/register.html -->
{% extends "layout.html" %}
{% block content %}
<div class="card" style="margin-top: 50px;">
    <h2 style="text-align: center;">Join BantayDaan</h2>
    <form method="POST">
        <label>Email</label>
        <input type="email" name="email" placeholder="Email" required>
        <br><br>
        <label>Password</label>
        <input type="password" name="password" placeholder="Password" required>
        <br><br>
        <button type="submit">Create Account</button>
    </form>
    <p style="text-align: center; font-size: 0.9rem; margin-top: 1rem;">
        Already have an account? <a href="/login" style="color: var(--primary); font-weight: bold; text-decoration: none;">Login</a>
    </p>
</div>
{% endblock %}
