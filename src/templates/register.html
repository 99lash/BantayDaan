<!-- src/templates/register.html -->
{% extends "layout.html" %}
{% block content %}
<div class="card" style="margin-top: 50px;">
    <h2 style="text-align: center;">Join BantayDaan</h2>
    <form method="POST">
        <input type="email" name="email" placeholder="Email" required style="width: 100%; padding: 0.8rem; margin-bottom: 1rem; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box;">
        <input type="password" name="password" placeholder="Password" required style="width: 100%; padding: 0.8rem; margin-bottom: 1rem; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box;">
        <button type="submit">Create Account</button>
    </form>
    <p style="text-align: center; font-size: 0.9rem; margin-top: 1rem;">
        Already have an account? <a href="/login">Login</a>
    </p>
</div>
{% endblock %}
